name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Check Formatting
      run: mvn fmt:check

  checkstyle:
    name: Check Style
    needs: format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run Checkstyle
      run: mvn checkstyle:check

  spotbugs:
    name: Run SpotBugs
    needs: checkstyle
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # spotbugs-maven-plugin 4.9+ requires JDK 11+ to run the plugin itself,
    # but can still analyze Java 8 bytecode (source/target compatibility unchanged).
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Run SpotBugs
      run: mvn spotbugs:check

  test:
    name: Run Tests
    needs: spotbugs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      run: mvn test

  javadocs:
    name: Generate JavaDocs
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Generate JavaDocs
      run: mvn javadoc:javadoc

  package:
    name: Package Application
    needs: javadocs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Package
      run: mvn package -DskipTests

    - name: Verify JAR Manifest Main-Class
      run: unzip -p target/cellular-automata-*.jar META-INF/MANIFEST.MF | grep "Main-Class: com.cellularautomata.app.Main"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Cellular Automata Symmetry Icon</title>
  <desc id="desc">A green pixel icon with a central grid and four symmetric diagonal branches.</desc>
  <g fill="#4ADE80">
    <!-- central 3x3 cell cluster -->
    <rect x="24" y="24" width="5" height="5" rx="0.75" />
    <rect x="30" y="24" width="5" height="5" rx="0.75" />
    <rect x="36" y="24" width="5" height="5" rx="0.75" />
    <rect x="24" y="30" width="5" height="5" rx="0.75" />
    <rect x="30" y="30" width="5" height="5" rx="0.75" />
    <rect x="36" y="30" width="5" height="5" rx="0.75" />
    <rect x="24" y="36" width="5" height="5" rx="0.75" />
    <rect x="30" y="36" width="5" height="5" rx="0.75" />
    <rect x="36" y="36" width="5" height="5" rx="0.75" />

    <!-- diagonal propagation cells -->
    <rect x="18" y="18" width="5" height="5" rx="0.75" />
    <rect x="42" y="18" width="5" height="5" rx="0.75" />
    <rect x="18" y="42" width="5" height="5" rx="0.75" />
    <rect x="42" y="42" width="5" height="5" rx="0.75" />

    <!-- outer corner colonies -->
    <rect x="8" y="8" width="5" height="5" rx="0.75" />
    <rect x="14" y="8" width="5" height="5" rx="0.75" />
    <rect x="8" y="14" width="5" height="5" rx="0.75" />

    <rect x="45" y="8" width="5" height="5" rx="0.75" />
    <rect x="51" y="8" width="5" height="5" rx="0.75" />
    <rect x="51" y="14" width="5" height="5" rx="0.75" />

    <rect x="8" y="45" width="5" height="5" rx="0.75" />
    <rect x="8" y="51" width="5" height="5" rx="0.75" />
    <rect x="14" y="51" width="5" height="5" rx="0.75" />

    <rect x="51" y="45" width="5" height="5" rx="0.75" />
    <rect x="45" y="51" width="5" height="5" rx="0.75" />
    <rect x="51" y="51" width="5" height="5" rx="0.75" />
  </g>
</svg>
